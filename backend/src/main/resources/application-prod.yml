spring:
  datasource:
    # Supabase Postgres. 예: jdbc:postgresql://db.xxxx.supabase.co:5432/postgres?sslmode=require
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ellink}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # 첫 배포: update(스키마 자동 생성) → 안정화 후 validate. 환경변수로 전환.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # graceful 종료: 재배포/스케일 시 진행 중 요청을 정리한 뒤 종료(헬스체크 플랩 완화).
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

# readiness 그룹은 readinessState 만 포함(기본값 명시). db/storage 같은 외부 의존 인디케이터를
# readiness 에서 제외해, 일시 장애가 Render 헬스체크 → 무한 재시작으로 번지지 않게 한다.
management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState

ellink:
  storage:
    # 운영 저장소 = Supabase Storage (CloudStorageService, @Profile("prod"))
    supabase:
      url: ${SUPABASE_URL:}
      service-key: ${SUPABASE_SERVICE_KEY:}
      bucket: ${SUPABASE_BUCKET:ellink-files}
  cors:
    # 콤마로 여러 개. 예: https://el-link-public.vercel.app
    allowed-origins: ${ELLINK_CORS_ORIGINS}

springdoc:
  swagger-ui:
    enabled: false   # 운영에서는 Swagger UI 비공개

logging:
  level:
    com.ellink: INFO
